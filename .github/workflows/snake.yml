name: Generate Snake

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 Lagos time (23:00 UTC)
    - cron: "0 23 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2

      - name: Generate Birthday Snake
        if: ${{ format('%m', github.event.schedule) == '12' }}
        uses: Platane/snk@v3
        with:
          github_user_name: williamseben818-ux
          outputs: output/snake-birthday.svg
          snake_color: "#00FFFF,#FF00FF,#39FF14,#9400D3"
          background: "output/fireworks-bg.svg"
          speed: 5

      - name: Generate Christmas Snake
        if: ${{ format('%m', github.event.schedule) == '12' }}
        uses: Platane/snk@v3
        with:
          github_user_name: williamseben818-ux
          outputs: output/snake-christmas.svg
          snake_color: "#FF0000,#008000,#FFD700"
          background: "output/christmas-bg.svg"
          speed: 4

      - name: Generate Halloween Snake
        if: ${{ format('%m', github.event.schedule) == '10' }}
        uses: Platane/snk@v3
        with:
          github_user_name: williamseben818-ux
          outputs: output/snake-halloween.svg
          snake_color: "#FF8C00,#000000,#800080"
          background: "output/halloween-bg.svg"
          speed: 4

      - name: Commit and Push Snake SVGs
        uses: EndBug/add-and-commit@v9
        with:
          add: 'output/*.svg'
          message: 'Update snake animations'
