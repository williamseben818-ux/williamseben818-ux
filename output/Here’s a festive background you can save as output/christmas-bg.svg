<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400">
  <rect width="100%" height="100%" fill="#001f3f"/>

  <!-- Snowflakes falling -->
  <circle cx="100" cy="0" r="5" fill="#FFFFFF">
    <animate attributeName="cy" from="0" to="400" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="0" r="4" fill="#FFFFFF">
    <animate attributeName="cy" from="0" to="400" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="0" r="6" fill="#FFFFFF">
    <animate attributeName="cy" from="0" to="400" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Christmas tree -->
  <polygon points="400,300 450,200 350,200" fill="#008000"/>
  <polygon points="400,250 460,150 340,150" fill="#006400"/>
  <polygon points="400,200 470,100 330,100" fill="#004d00"/>
  <rect x="390" y="300" width="20" height="40" fill="#8B4513"/>

  <!-- Star on top -->
  <polygon points="400,80 405,95 420,95 408,105 412,120 400,110 388,120 392,105 380,95 395,95"
           fill="#FFD700">
    <animateTransform attributeName="transform" type="rotate"
      from="0 400 100" to="360 400 100" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Twinkling lights -->
  <circle cx="380" cy="220" r="3" fill="#FF0000">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="240" r="3" fill="#00FFFF">
    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="260" r="3" fill="#FFD700">
    <animate attributeName="r" values="3;6;3" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
